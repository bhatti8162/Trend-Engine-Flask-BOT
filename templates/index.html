<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Engine</title>
<style>
  body {
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  .header {
    padding: 20px;
    text-align: center;
    background: #111;
    border-bottom: 1px solid #222;
  }
  #symbol {
    font-size: 28px;
    font-weight: bold;
  }
  #price {
    font-size: 24px;
    margin-top: 5px;
  }
  #decision {
    font-size: 20px;
    margin-top: 5px;
    /* color: #ffff; */
    font-weight: bold;
  }
  .tf-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
  }
  .tf-card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 15px;
    margin: 10px;
    min-width: 140px;
  }
  .tf-card h3 {
    margin: 0 0 10px 0;
    text-align: center;
  }
  .green { color: #00ff88; }
  .red { color: #ff4444; }
  .gray { color: #999; }
  .times {
    padding: 20px;
    text-align: center;
  }
  .loading {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .loading img {
    width: 60px;
  }
  .input-container {
    text-align: center;
    padding: 10px;
  }
  #symbol-input {
    padding: 6px 8px;
    font-size: 16px;
    margin-right: 10px;
    background: #111;
    color: #fff;
    border: 1px solid #222;
  }
  #load-btn {
    padding: 6px 12px;
    background: #111;
    color: #fff;
    border: 1px solid #222;
  }
  #load-btn:hover {
    cursor: pointer;
    background: #222;
  }
</style>
</head>
<body>

<div class="header">
  <div style="display: flex; gap: 5px; width: fit-content; margin: 0 auto;">
    <div id="predicted_color_h1">--</div>
    <div id="btc_h1_change">--</div>
    <div id="btc_d1_change">--</div>
    <div id="btc_h1_color">--</div>
    <div id="btc_d1_color">--</div>

  </div>
  <div style="display: flex; gap: 5px; width: fit-content; margin: 0 auto;">
  </div>
  <div id="symbol">--</div>
  <div id="price">--</div>
</div>
</br>
<div class="input-container">
  <input type="text" id="symbol-input" placeholder="Enter symbol e.g. BTCUSDT">
  <button id="load-btn">Load</button>
  <div id="decision">--</div>
</div>

<div class="tf-container" id="tf-container"></div>

<div class="times" id="times"></div>

<div class="loading" id="loading">
  <img src="https://i.gifer.com/ZZ5H.gif" alt="Loading...">
</div>

<footer style="background:#111; color:#fff; padding:20px; font-family:Arial,sans-serif; text-align:center;">
  <h3>Important Crypto Resources</h3>
  <ul style="list-style:none; padding:0; margin:0;">
    <li><a href="https://coinmarketcap.com/" target="_blank" style="color:#1E90FF; text-decoration:none;">CoinMarketCap</a></li>
    <li><a href="https://cryptobubbles.net/" target="_blank" style="color:#1E90FF; text-decoration:none;">Crypto Bubbles</a></li>
    <li><a href="https://demo.binance.com/en/futures/BTCUSDT" target="_blank" style="color:#1E90FF; text-decoration:none;">Binance Futures Demo</a></li>
  </ul>
</footer>

<script>
async function loadTrend(symbol = "BTCUSDT") {
  showLoading(true);
  try {
    const res = await fetch(`/api/trend?symbol=${symbol}`);
    const data = await res.json();

    renderHeader(data);
    renderTimeframes(data);
    renderTimes(data.times);

  } catch (err) {
    console.error("API Error:", err);
  }
  showLoading(false);
}

function renderHeader(data) {
  document.getElementById("symbol").innerText = data.symbol || "--";
  document.getElementById("price").innerText = data.price || "--";
  // change of last candle
  document.getElementById("btc_h1_change").innerHTML = `<p>BTC Change <span class="${colorH1Change(data.btc_h1_change)}">1H ${data.btc_h1_change}</span>,</p>` || "--";
  document.getElementById("btc_d1_change").innerHTML = `<p><span class="${colorH1Change(data.btc_d1_change)}">1D ${data.btc_d1_change}</span> | </p>` || "--";
  // color of last candle
  document.getElementById("btc_h1_color").innerHTML = `<p>BTC Candle Color <span class="${colorH1Change(data.colors['1h'])}">1H ${data.colors['1h']}</span>,</p>` || "--";
  document.getElementById("btc_d1_color").innerHTML = `<p><span class="${colorH1Change(data.colors['1d'])}">1D ${data.colors['1d']}</span> </p>` || "--";
  // demand supply level
  document.getElementById("predicted_color_h1").innerHTML = `<p>H1 Pridiction<span class="${colorTrend(data.predicted_color_h1)}"> ${data.predicted_color_h1}</span> | </p>` || "--";
 
  document.getElementById("decision").innerHTML = `<p><span class="${colorTrend(data.trade_decision)}">${data.trade_decision}</span></p>` || "--";
}

function renderTimeframes(data) {
  const container = document.getElementById("tf-container");
  container.innerHTML = "";

  if (!data.trends) return;

  // Order of timeframes
  const orderedTimeframes = ["1d","1h", "15m", "5m", "1m"];

  orderedTimeframes.forEach(tf => {
    if (!data.trends[tf]) return; // skip if missing

    const trend = data.trends[tf] || "--";
    const ema = data.ema25_strength[tf] || "--";
    const vwap = data.vwap_strength[tf] || "--";
    const rsi = data.rsi_strength[tf] || ["--", "--"];
    const adx = data.adx_strength[tf] || ["--", "--"];
    const atr = data.atr_strength[tf] || ["--", "--"];

    const card = document.createElement("div");
    card.className = "tf-card";

    card.innerHTML = `
      <h3>${tf}</h3>
      <p>Symbol: <b>${data.symbol}</b></p>
      <p>Trend: <span class="${colorTrend(trend)}">${trend}</span></p>
      <p>EMA25: <span class="${colorTrend(ema)}">${ema}</span></p>
      <p>VWAP: <span class="${colorVWAP(vwap)}">${vwap}</span></p>
      <p>RSI: ${rsi[0]} (${rsi[1]})</p>
      <p>ADX: ${adx[0]} (${adx[1]})</p>
      <p>ATR: ${atr[0]} (${atr[1]})</p>
    `;

    container.appendChild(card);
  });
}

function renderTimes(apiTimes) {
  const container = document.getElementById("times");
  container.innerHTML = "";

  // Current PKT time
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const pkt = new Date(utc + 5*60*60*1000);
  const currentHour = pkt.getHours();
  const currentMinute = pkt.getMinutes();
  const currentTime = currentHour + currentMinute/60;

  const sessions = {
    "Tokyo": { start: 3, end: 12, label: "3:00 AM – 12:00 PM" },
    "London": { start: 12, end: 21, label: "12:00 PM – 9:00 PM" },
    "NewYork": { start: 17, end: 26, label: "5:00 PM – 2:00 AM" }
  };

  const order = ["UTC", "PK", "Tokyo", "London", "NewYork"];
  order.forEach(key => {
    let className = "gray";
    let timeLabel = "--";

    if (key === "Tokyo") {
      timeLabel = sessions.Tokyo.label;
      if (currentTime >= sessions.Tokyo.start && currentTime < sessions.Tokyo.end) className = "green";
    }
    else if (key === "London") {
      timeLabel = sessions.London.label;
      if (currentTime >= sessions.London.start && currentTime < sessions.London.end) className = "green";
    }
    else if (key === "NewYork") {
      timeLabel = sessions.NewYork.label;
      let nyEnd = sessions.NewYork.end > 24 ? sessions.NewYork.end - 24 : sessions.NewYork.end;
      if ((currentTime >= sessions.NewYork.start && currentTime < 24) || (currentTime >= 0 && currentTime < nyEnd)) className = "green";
    }

    if (key === "UTC") timeLabel = apiTimes.UTC
    if (key === "PK") timeLabel = apiTimes.PK

    const row = document.createElement("div");
    row.innerHTML = `<b>${key}:</b> <span class="${className}">${timeLabel}</span>`;
    container.appendChild(row);
  });
}

function colorTrend(value) {
  value = String(value)
  if (!value) return "gray";

  const greenKeywords = ["UP", "GREEN", "BULLISH", "Bullish", "ABOVE"];
  const redKeywords = ["DOWN", "RED", "BEARISH", "Bearish", "BELOW"];

  if (greenKeywords.some(keyword => value.includes(keyword))) return "green";
  if (redKeywords.some(keyword => value.includes(keyword))) return "red";

  return "gray";
}
function colorH1Change(value) {
  value = String(value)
  if (!value) return "gray";

  const redKeywords = ["-", "RED", "FALSE"];

  if (redKeywords.some(keyword => value.includes(keyword))) return "red";

  return "green";
}

function colorVWAP(value) {
  return value === "ABOVE" ? "green" : "red";
}

function showLoading(state) {
  document.getElementById("loading").style.display = state ? "block" : "none";
}

// Button click to load symbol
document.getElementById("load-btn").addEventListener("click", () => {
  const symbol = document.getElementById("symbol-input").value.trim().toUpperCase();
  if (symbol) loadTrend(symbol);
});

// initial load
loadTrend();
</script>
</body>
</html>
